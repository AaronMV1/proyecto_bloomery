<header>
    <h1>Bloomery Flower</h1>
</header>

<div class="mini-header">
    <p>Ofertas exclusivas por el dia de hoy! 25% desc.</p>
</div>

<menu>
    <a>Inicio</a>
    <a>Nuestra tienda</a>
    <a>Ofertas</a>
    <a>Contacto</a>
</menu>

<div class="banner">
  <div 
    class="banner-track" 
    [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
  >
    <a 
      *ngFor="let banner of banners" 
      [href]="banner.url" 
      target="_blank"
      class="banner-item"
    >
      <img [src]="banner.imageUrl" class="banner-image" />
    </a>
  </div>
</div>

<div class="categorias">

    <div class="categoria">
        <div class="portada"></div>
        <h3>Plantas de Interiores</h3>
        <p>Ver categoría</p>
    </div>

    <div class="categoria">
        <div class="portada"></div>
        <h3>Plantas de Exteriores</h3>
        <p>Ver categoría</p>
    </div>

    <div class="categoria">
        <div class="portada"></div>
        <h3>Decoración y Macetas</h3>
        <p>Ver categoría</p>
    </div>

    <div class="categoria">
        <div class="portada"></div>
        <h3>Arreglos Funebres</h3>
        <p>Ver categoría</p>
    </div>

</div>
